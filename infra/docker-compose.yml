name: revue

services:
  airflow-init:
    build:
      context: ../airflow
    image: revue-airflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://revue:${DB_PASSWORD}@postgres:5432/revue
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: revue
      DB_USER: revue
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    entrypoint: airflow db migrate
    restart: "no"

  airflow-scheduler:
    image: revue-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://revue:${DB_PASSWORD}@postgres:5432/revue
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: revue
      DB_USER: revue
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: airflow scheduler
    restart: unless-stopped

  airflow-webserver:
    image: revue-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://revue:${DB_PASSWORD}@postgres:5432/revue
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      PYTHONPATH: /opt/airflow
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: revue
      DB_USER: revue
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    command: airflow webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: revue
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: revue
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revue -d revue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: